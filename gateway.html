<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | NSE AI Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b1121;
            --panel-bg: rgba(17, 24, 39, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6; 
            --accent-gold: #f59e0b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --danger-color: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.15);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 40%), 
                              radial-gradient(circle at -10% 80%, rgba(245, 158, 11, 0.05) 0%, transparent 30%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            padding: 20px;
        }

        /* 1. Layout & Structure */
        .gateway-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 440px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            padding: 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .gateway-card:hover {
            border-color: rgba(59, 130, 246, 0.2);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .gateway-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .gateway-header h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            color: var(--text-color);
        }

        .gateway-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Logo Branding */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #ffffff;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .logo-text {
            text-align: left;
        }

        .logo-title {
            font-weight: 800;
            color: #ffffff;
            font-size: 18px;
            line-height: 1.2;
        }

        .logo-subtitle {
            color: var(--accent-gold);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: block;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 20px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        /* Single-Column Form with Floating Labels */
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            background: rgba(0, 0, 0, 0.25);
            color: var(--text-color);
        }

        /* Floating Label Logic */
        .input-group label {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
            pointer-events: none;
            transition: 0.2s ease all;
            background: var(--bg-color);
            padding: 0 6px;
            border-radius: 4px;
        }

        .input-group input:focus,
        .input-group input:not(:placeholder-shown) {
            border-color: var(--accent-blue);
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: 0;
            font-size: 11px;
            color: var(--accent-blue);
            font-weight: 600;
        }

        /* Inline Validation Error */
        .error-msg {
            color: var(--danger-color);
            font-size: 11px;
            margin-top: 4px;
            display: none;
            padding-left: 5px;
        }
        .input-group.error input { border-color: var(--danger-color); }
        .input-group.error .error-msg { display: block; }
        .input-group.error label { color: var(--danger-color) !important; }

        /* Primary Button */
        .primary-btn {
            background: linear-gradient(135deg, var(--accent-blue) 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .primary-btn:active {
            transform: translateY(1px);
        }

        /* Loading State */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .primary-btn.loading .spinner { display: block; }
        .primary-btn.loading .btn-text { display: none; }
        .primary-btn.loading { pointer-events: none; opacity: 0.9; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile Friendly Adjustments */
        @media (max-width: 480px) {
            .gateway-card {
                padding: 30px 20px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="gateway-card" id="gatewayCard">
        <!-- Logo Branding -->
        <div class="logo-container">
            <div class="logo-icon">N</div>
            <div class="logo-text">
                <span class="logo-title">NSE India</span>
                <span class="logo-subtitle">AI Forecasting Pipeline</span>
            </div>
        </div>

        <div class="gateway-header">
            <h2 id="formTitle">AI System Gateway</h2>
            <p id="formSubtitle">Secure access to market analytics & forecast engine</p>
        </div>

        <form id="gatewayForm" onsubmit="handleSubmit(event)">
            <div style="text-align: center; margin: 10px 0 20px 0; font-size: 14px; color: var(--text-muted); line-height: 1.5;">
                You are entering the guest environment. No sensitive information is collected.
            </div>

            <button type="submit" class="primary-btn" id="submitBtn">
                <span class="btn-text" id="submitText">Enter Dashboard</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.classList.add('loading');

            // Simulate Gateway Handshake
            setTimeout(() => {
                btn.classList.remove('loading');
                // Set gateway state
                localStorage.setItem("gatewayPassed", "true");
                // Navigate to dashboard
                window.location.href = "index.html";
            }, 1000);
        }
    </script>
</body>
</html>
